# H2 内存数据库配置（数据仅在应用运行时存在，重启后自动清空）
spring.datasource.url=jdbc:h2:mem:epochshop;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 自动建表（每次启动重建，因为内存数据库）
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 控制台（可选，生产关闭）
spring.h2.console.enabled=false

# JWT 密钥（使用固定值即可，生产建议改为环境变量）
jwt.secret=YourSuperSecretKeyForJWTGenerationMustBeAtLeast256BitsLong!